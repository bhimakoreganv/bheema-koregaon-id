<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Registration</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f5ff;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003399;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#003399;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

button:hover{
background:#FFD700;
color:black;
}
</style>

</head>
<body>

<div class="container">

<h2>ಭೀಮಾ ಕೋರೆಗಾಂವ್ ಸದಸ್ಯ ನೋಂದಣಿ</h2>

<input type="file">

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Father Name">

<input type="tel" placeholder="Mobile Number">

<input type="text" placeholder="Aadhaar Number">

<input type="text" placeholder="District">

<input type="text" placeholder="Taluk">

<input type="text" placeholder="Village">

<textarea placeholder="Address"></textarea>

<button>Register Member</button>

</div>

</body>
</html>
